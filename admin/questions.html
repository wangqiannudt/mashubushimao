<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题库管理 - 麻薯的知识星球</title>
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-dark: #1a1a2e;
            --bg-darker: #16213e;
            --bg-card: #0f0f1a;
            --text-primary: #ffffff;
            --text-secondary: #888;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius: 12px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
            min-height: 100vh;
            color: var(--text-primary);
        }
        
        /* 导航 */
        .navbar {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .navbar h1 {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .navbar-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }
        
        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }
        
        .btn-danger:hover { background: rgba(239, 68, 68, 0.3); }
        
        .btn-success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }
        
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        /* 主内容 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stat-card .label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        /* 工具栏 */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .toolbar-left {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .filter-select {
            padding: 10px 15px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }
        
        .search-input {
            padding: 10px 15px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            width: 250px;
        }
        
        .search-input::placeholder { color: var(--text-secondary); }
        
        /* 表格 */
        .table-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        th {
            background: rgba(255,255,255,0.03);
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        
        td { font-size: 14px; }
        
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .type-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .type-single { background: rgba(102, 126, 234, 0.2); color: #667eea; }
        .type-multi { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .type-judge { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .type-fill { background: rgba(236, 72, 153, 0.2); color: #ec4899; }
        
        .difficulty-stars { color: #f59e0b; }
        
        .actions {
            display: flex;
            gap: 8px;
        }
        
        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 20px;
        }
        
        .pagination button {
            padding: 8px 15px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
        }
        
        .pagination button:hover { background: rgba(255,255,255,0.15); }
        .pagination button.active { background: var(--primary); }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.show { display: flex; }
        
        .modal-content {
            background: var(--bg-darker);
            border-radius: var(--radius);
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 { font-size: 18px; }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-body { padding: 20px; }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .options-editor {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 15px;
        }
        
        .option-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        
        .option-row .letter {
            width: 30px;
            height: 30px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }
        
        .option-row input {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: var(--text-primary);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }
        
        .modal-footer {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state .icon { font-size: 48px; margin-bottom: 15px; }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .form-row { grid-template-columns: 1fr; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .search-input { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- 导航 -->
    <nav class="navbar">
        <h1>🐱 题库管理</h1>
        <div class="navbar-actions">
            <a href="/admin/" class="btn btn-secondary">← 返回后台</a>
            <button class="btn btn-primary" onclick="openAddModal()">➕ 添加题目</button>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="container">
        <!-- 统计 -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="value" id="statTotal">-</div>
                <div class="label">总题数</div>
            </div>
            <div class="stat-card">
                <div class="value" id="statSingle">-</div>
                <div class="label">单选题</div>
            </div>
            <div class="stat-card">
                <div class="value" id="statJudge">-</div>
                <div class="label">判断题</div>
            </div>
            <div class="stat-card">
                <div class="value" id="statMulti">-</div>
                <div class="label">多选题</div>
            </div>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar">
            <div class="toolbar-left">
                <select class="filter-select" id="filterCategory" onchange="loadQuestions()">
                    <option value="">所有分类</option>
                </select>
                <select class="filter-select" id="filterType" onchange="loadQuestions()">
                    <option value="">所有类型</option>
                    <option value="single">单选题</option>
                    <option value="multi">多选题</option>
                    <option value="judge">判断题</option>
                    <option value="fill">填空题</option>
                </select>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索题目..." onkeyup="if(event.key==='Enter')loadQuestions()">
            </div>
            <div>
                <button class="btn btn-secondary" onclick="exportQuestions()">📥 导出</button>
                <button class="btn btn-success" onclick="document.getElementById('importFile').click()">📤 导入</button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importQuestions(this.files[0])">
            </div>
        </div>

        <!-- 表格 -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th width="50">ID</th>
                        <th>题目</th>
                        <th width="80">类型</th>
                        <th width="100">分类</th>
                        <th width="80">难度</th>
                        <th width="120">操作</th>
                    </tr>
                </thead>
                <tbody id="questionsTable">
                    <tr><td colspan="6" class="loading">加载中...</td></tr>
                </tbody>
            </table>
            
            <!-- 分页 -->
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <!-- 添加/编辑模态框 -->
    <div class="modal" id="questionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">添加题目</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="questionForm">
                    <input type="hidden" id="questionId">
                    
                    <div class="form-group">
                        <label>题目内容 *</label>
                        <textarea id="questionTitle" required placeholder="输入题目内容..."></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>题目类型 *</label>
                            <select id="questionType" onchange="updateOptionsEditor()">
                                <option value="single">单选题</option>
                                <option value="multi">多选题</option>
                                <option value="judge">判断题</option>
                                <option value="fill">填空题</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>分类 *</label>
                            <select id="questionCategory">
                                <option value="招投标法">招投标法</option>
                                <option value="政府采购法">政府采购法</option>
                                <option value="招标投标法实施条例">招标投标法实施条例</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>难度</label>
                            <select id="questionDifficulty">
                                <option value="1">⭐ 简单</option>
                                <option value="2">⭐⭐ 一般</option>
                                <option value="3">⭐⭐⭐ 较难</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group" id="optionsGroup">
                        <label>选项</label>
                        <div class="options-editor" id="optionsEditor">
                            <div class="option-row"><span class="letter">A</span><input type="text" id="optA" placeholder="选项A"></div>
                            <div class="option-row"><span class="letter">B</span><input type="text" id="optB" placeholder="选项B"></div>
                            <div class="option-row"><span class="letter">C</span><input type="text" id="optC" placeholder="选项C"></div>
                            <div class="option-row"><span class="letter">D</span><input type="text" id="optD" placeholder="选项D"></div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>正确答案 *</label>
                        <input type="text" id="questionAnswer" required placeholder="单选填A，多选填ABC，判断填A(正确)/B(错误)">
                    </div>
                    
                    <div class="form-group">
                        <label>答案解析</label>
                        <textarea id="questionExplanation" placeholder="答案解析（可选）"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>来源</label>
                        <input type="text" id="questionSource" placeholder="如：《招投标法》第二十四条">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveQuestion()">💾 保存</button>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const API_BASE = '/api/v2';
        let token = localStorage.getItem('token');
        let currentPage = 1;
        let totalPages = 1;
        const pageSize = 20;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadStats();
            loadQuestions();
        });
        
        // 检查登录
        async function checkAuth() {
            if (!token) {
                alert('请先登录');
                window.location.href = '/login.html';
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/auth/verify`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if (!data.valid || data.user.role !== 'admin') {
                    alert('需要管理员权限');
                    window.location.href = '/';
                }
            } catch (e) {
                alert('认证失败，请重新登录');
                window.location.href = '/login.html';
            }
        }
        
        // 加载统计
        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                document.getElementById('statTotal').textContent = data.total_questions || 0;
                
                // 按类型统计
                const byType = data.categories || {};
                document.getElementById('statSingle').textContent = byType['single'] || 0;
                document.getElementById('statJudge').textContent = byType['judge'] || 0;
                document.getElementById('statMulti').textContent = (byType['multi'] || 0) + (byType['fill'] || 0);
                
                // 更新分类筛选
                const categorySelect = document.getElementById('filterCategory');
                categorySelect.innerHTML = '<option value="">所有分类</option>';
                for (const cat in byType) {
                    if (!['single', 'multi', 'judge', 'fill'].includes(cat)) {
                        categorySelect.innerHTML += `<option value="${cat}">${cat}</option>`;
                    }
                }
            } catch (e) {
                console.error('加载统计失败', e);
            }
        }
        
        // 加载题目列表
        async function loadQuestions(page = 1) {
            currentPage = page;
            const category = document.getElementById('filterCategory').value;
            const type = document.getElementById('filterType').value;
            const search = document.getElementById('searchInput').value;
            
            let url = `${API_BASE}/questions?limit=${pageSize}&offset=${(page-1)*pageSize}`;
            if (category) url += `&category=${encodeURIComponent(category)}`;
            if (type) url += `&type=${type}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                
                const tbody = document.getElementById('questionsTable');
                
                if (data.items.length === 0) {
                    tbody.innerHTML = `
                        <tr><td colspan="6" class="empty-state">
                            <div class="icon">📭</div>
                            <div>暂无题目</div>
                        </td></tr>
                    `;
                    return;
                }
                
                tbody.innerHTML = data.items.map(q => `
                    <tr>
                        <td>${q.id}</td>
                        <td>${q.title.substring(0, 60)}${q.title.length > 60 ? '...' : ''}</td>
                        <td><span class="type-badge type-${q.question_type}">${getTypeName(q.question_type)}</span></td>
                        <td>${q.category}</td>
                        <td><span class="difficulty-stars">${'⭐'.repeat(q.difficulty)}</span></td>
                        <td class="actions">
                            <button class="btn btn-small btn-secondary" onclick="editQuestion(${q.id})">编辑</button>
                            <button class="btn btn-small btn-danger" onclick="deleteQuestion(${q.id})">删除</button>
                        </td>
                    </tr>
                `).join('');
                
                // 更新分页
                totalPages = Math.ceil(data.total / pageSize);
                renderPagination();
                
            } catch (e) {
                console.error('加载题目失败', e);
                document.getElementById('questionsTable').innerHTML = `
                    <tr><td colspan="6" class="empty-state">
                        <div class="icon">❌</div>
                        <div>加载失败</div>
                    </td></tr>
                `;
            }
        }
        
        // 渲染分页
        function renderPagination() {
            const container = document.getElementById('pagination');
            let html = '';
            
            html += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="loadQuestions(${currentPage-1})">上一页</button>`;
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="loadQuestions(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span>...</span>`;
                }
            }
            
            html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="loadQuestions(${currentPage+1})">下一页</button>`;
            
            container.innerHTML = html;
        }
        
        // 获取类型名称
        function getTypeName(type) {
            const names = { single: '单选', multi: '多选', judge: '判断', fill: '填空' };
            return names[type] || type;
        }
        
        // 打开添加模态框
        function openAddModal() {
            document.getElementById('modalTitle').textContent = '添加题目';
            document.getElementById('questionForm').reset();
            document.getElementById('questionId').value = '';
            updateOptionsEditor();
            document.getElementById('questionModal').classList.add('show');
        }
        
        // 编辑题目
        async function editQuestion(id) {
            try {
                const res = await fetch(`${API_BASE}/questions/${id}`);
                const q = await res.json();
                
                document.getElementById('modalTitle').textContent = '编辑题目';
                document.getElementById('questionId').value = q.id;
                document.getElementById('questionTitle').value = q.title;
                document.getElementById('questionType').value = q.question_type;
                document.getElementById('questionCategory').value = q.category;
                document.getElementById('questionDifficulty').value = q.difficulty;
                document.getElementById('questionAnswer').value = q.answer;
                document.getElementById('questionExplanation').value = q.answer_explanation || '';
                document.getElementById('questionSource').value = q.source || '';
                
                updateOptionsEditor();
                
                // 填充选项
                if (q.options) {
                    for (const key in q.options) {
                        const input = document.getElementById(`opt${key}`);
                        if (input) input.value = q.options[key];
                    }
                }
                
                document.getElementById('questionModal').classList.add('show');
            } catch (e) {
                alert('加载题目失败');
            }
        }
        
        // 更新选项编辑器
        function updateOptionsEditor() {
            const type = document.getElementById('questionType').value;
            const group = document.getElementById('optionsGroup');
            const editor = document.getElementById('optionsEditor');
            
            if (type === 'judge') {
                group.style.display = 'block';
                editor.innerHTML = `
                    <div class="option-row"><span class="letter">A</span><input type="text" id="optA" value="正确" readonly></div>
                    <div class="option-row"><span class="letter">B</span><input type="text" id="optB" value="错误" readonly></div>
                `;
            } else if (type === 'fill') {
                group.style.display = 'none';
            } else {
                group.style.display = 'block';
                editor.innerHTML = `
                    <div class="option-row"><span class="letter">A</span><input type="text" id="optA" placeholder="选项A"></div>
                    <div class="option-row"><span class="letter">B</span><input type="text" id="optB" placeholder="选项B"></div>
                    <div class="option-row"><span class="letter">C</span><input type="text" id="optC" placeholder="选项C"></div>
                    <div class="option-row"><span class="letter">D</span><input type="text" id="optD" placeholder="选项D"></div>
                `;
            }
        }
        
        // 关闭模态框
        function closeModal() {
            document.getElementById('questionModal').classList.remove('show');
        }
        
        // 保存题目
        async function saveQuestion() {
            const id = document.getElementById('questionId').value;
            const type = document.getElementById('questionType').value;
            
            // 收集选项
            let options = null;
            if (type !== 'fill') {
                options = {};
                ['A', 'B', 'C', 'D'].forEach(letter => {
                    const input = document.getElementById(`opt${letter}`);
                    if (input && input.value.trim()) {
                        options[letter] = input.value.trim();
                    }
                });
            }
            
            const data = {
                title: document.getElementById('questionTitle').value.trim(),
                question_type: type,
                options: options,
                answer: document.getElementById('questionAnswer').value.trim().toUpperCase(),
                answer_explanation: document.getElementById('questionExplanation').value.trim() || null,
                category: document.getElementById('questionCategory').value,
                difficulty: parseInt(document.getElementById('questionDifficulty').value),
                source: document.getElementById('questionSource').value.trim() || null
            };
            
            if (!data.title || !data.answer) {
                alert('请填写题目内容和答案');
                return;
            }
            
            try {
                const url = id ? `${API_BASE}/questions/${id}` : `${API_BASE}/questions`;
                const method = id ? 'PUT' : 'POST';
                
                const res = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await res.json();
                
                if (res.ok) {
                    alert(id ? '更新成功' : '添加成功');
                    closeModal();
                    loadQuestions(currentPage);
                    loadStats();
                } else {
                    alert('保存失败: ' + (result.detail || JSON.stringify(result)));
                }
            } catch (e) {
                alert('保存失败');
            }
        }
        
        // 删除题目
        async function deleteQuestion(id) {
            if (!confirm('确定要删除这道题目吗？')) return;
            
            try {
                const res = await fetch(`${API_BASE}/questions/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.ok) {
                    alert('删除成功');
                    loadQuestions(currentPage);
                    loadStats();
                } else {
                    alert('删除失败');
                }
            } catch (e) {
                alert('删除失败');
            }
        }
        
        // 导出题目
        async function exportQuestions() {
            try {
                const res = await fetch(`${API_BASE}/questions?limit=1000`);
                const data = await res.json();
                
                const blob = new Blob([JSON.stringify(data.items, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `questions_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
            } catch (e) {
                alert('导出失败');
            }
        }
        
        // 导入题目
        async function importQuestions(file) {
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const questions = JSON.parse(e.target.result);
                    const array = Array.isArray(questions) ? questions : [questions];
                    
                    let success = 0;
                    for (const q of array) {
                        const res = await fetch(`${API_BASE}/questions`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify(q)
                        });
                        if (res.ok) success++;
                    }
                    
                    alert(`成功导入 ${success}/${array.length} 道题目`);
                    loadQuestions();
                    loadStats();
                } catch (e) {
                    alert('导入失败，请检查文件格式');
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
